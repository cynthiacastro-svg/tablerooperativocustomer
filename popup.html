<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; width: 300px; background: #f8fafc; color: #333; }
  .header { background: linear-gradient(135deg,#1a3a5c,#2563a8); color:white; padding:14px 16px; }
  .header h1 { font-size:0.9rem; font-weight:700; }
  .header p  { font-size:0.7rem; opacity:0.8; margin-top:2px; }
  .body { padding:14px 16px; }
  .status-bar { background:white; border:1px solid #e2e8f0; border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:0.78rem; }
  .status-bar .url  { color:#2563a8; font-weight:600; word-break:break-all; font-size:0.72rem; }
  .status-bar .info { color:#888; margin-top:4px; font-size:0.72rem; }
  .btn { display:block; width:100%; padding:9px; border:none; border-radius:7px; cursor:pointer; font-size:0.83rem; font-weight:700; margin-bottom:8px; }
  .btn-open { background:#1a3a5c; color:white; }
  .btn-open:hover { background:#2563a8; }
  .msg { font-size:0.75rem; padding:8px 10px; border-radius:6px; margin-bottom:10px; }
  .msg-warn { background:#fef3c7; color:#92400e; }
  .msg-ok   { background:#dcfce7; color:#166534; }
  .hint { font-size:0.7rem; color:#94a3b8; text-align:center; padding-top:8px; line-height:1.4; }
</style>
</head>
<body>
<div class="header">
  <h1>Andesmar — driv.in</h1>
  <p>Conector para seguimiento de órdenes</p>
</div>
<div class="body">
  <div class="status-bar">
    <div class="url"  id="pageUrl">Detectando...</div>
    <div class="info" id="pageInfo"></div>
  </div>
  <div id="msgBox" class="msg msg-warn" style="display:none;"></div>
  <button class="btn btn-open" onclick="openDriv()">🌐 Abrir driv.in — Histórico</button>
  <div class="hint">
    Usá los botones <strong>"🔍 Ver en driv.in"</strong><br>
    del Tablero de Derivación para buscar<br>
    cada guía automáticamente.
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
